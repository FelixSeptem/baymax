name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test
        run: go test ./...

      - name: Go test (race)
        run: go test -race ./...

      - name: Runtime Boundary Check
        run: bash scripts/check-runtime-boundaries.sh

      - name: Docs Consistency Check
        run: pwsh -File scripts/check-docs-consistency.ps1

      - name: Benchmark smoke
        run: go test ./integration -run ^$ -bench Benchmark -benchtime=50ms

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --config=.golangci.yml
