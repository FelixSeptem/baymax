schema: spec-driven

context: |
  技术栈: Go
  代码风格: gofmt/goimports
  测试邀请: go test -race ./... 
  代码质量工具: golangci-lint

rules:
  - name: 职责划分
    description: |
      每个组件都有其特定的职责，不能跨组件承担职责。
      优先考虑组件之间的解耦，避免组件之间的直接依赖。
      优先考虑可复用的组件，避免重复实现相同的功能。
  - name: 变更范围确认
    description: |
      在指定提案的时候，从主流程出发，确认变更的范围。
