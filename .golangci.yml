version: "2"

run:
  timeout: 10m
  tests: true
  issues-exit-code: 1
  relative-path-mode: gomod
  modules-download-mode: readonly

output:
  format: colored-line-number

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - misspell
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    goimports:
      local-prefixes: github.com/FelixSeptem/baymax
    revive:
      severity: warning
      rules:
        - name: error-return
        - name: error-strings
        - name: if-return
        - name: indent-error-flow
        - name: var-naming

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
